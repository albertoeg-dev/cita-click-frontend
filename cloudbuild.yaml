# ============================================
# CLOUD BUILD - FRONTEND (Vue.js + nginx)
# Usa Cloud Run Source Deploy — no requiere
# Artifact Registry propio ni pasos Docker manuales.
# ============================================
# Trigger PROD (master):  sin variables extra (defaults)
# Trigger QA   (test):
#   _BUILD_SCRIPT = build:qa
#   _SERVICE_NAME = citaclick-frontend-qa

substitutions:
  _BUILD_SCRIPT: build
  _SERVICE_NAME: citaclick-frontend-prod

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--source'
      - '.'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--build-env-vars'
      - 'BUILD_SCRIPT=${_BUILD_SCRIPT}'
    timeout: '1200s'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
