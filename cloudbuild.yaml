# ============================================
# CLOUD BUILD - FRONTEND (Vue.js + nginx)
# ============================================
# Trigger: push a master → build + deploy en Cloud Run (prod)
# Trigger: push a test   → build + deploy en Cloud Run (qa)

steps:
  # 1. Construir imagen Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cita-click-images/citaclick-frontend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cita-click-images/citaclick-frontend:latest'
      - '.'

  # 2. Subir imagen a Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cita-click-images/citaclick-frontend'

  # 3. Desplegar en Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'citaclick-frontend-prod'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cita-click-images/citaclick-frontend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cita-click-images/citaclick-frontend'

options:
  logging: CLOUD_LOGGING_ONLY
